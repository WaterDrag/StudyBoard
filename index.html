<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>StudyBoard – Přihlášení</title>
  <script>document.write('<script src="js/version.js?t=' + Date.now() + '"><\/script>');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>document.write('<link rel="stylesheet" href="css/style.css?v='+APP_VERSION+'">');</script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <h1>StudyBoard</h1>
        <p>Sdílené nástěnky pro studenty</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <button id="googleBtn" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Přihlásit se přes Google
      </button>

      <div class="divider">nebo</div>

      <form id="authForm" autocomplete="on">
        <div class="form-group">
          <input id="emailInput" type="email" class="input" placeholder="Emailová adresa" autocomplete="email" required>
        </div>
        <div class="form-group">
          <input id="passwordInput" type="password" class="input" placeholder="Heslo (min. 6 znaků)" autocomplete="current-password" required minlength="6">
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">
          Přihlásit se
        </button>
      </form>

      <div class="auth-footer">
        <button id="toggleMode" class="link-btn">Nemáš účet? Registruj se</button>
      </div>

      <button id="guestBtn" class="btn" style="width:100%;justify-content:center;padding:11px;margin-top:12px;background:transparent;border:1px solid rgba(148,163,184,.35);color:#cbd5e1;">
        🎮 Hrát jako host (bez účtu)
      </button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/config.js"></script>
  <script>(function(){var s=document.createElement('script');s.src='js/auth.js?v='+APP_VERSION;document.head.appendChild(s);})();</script>
</body>
</html>
